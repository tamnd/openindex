name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep the fleet fully static and cross-compilable; -race overrides this.
  CGO_ENABLED: "0"

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - name: Verify modules are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build all roles
        run: go build ./...

      - name: Test
        run: go test ./...

  race:
    name: race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
      - name: Test under -race
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt -s:"; echo "$unformatted"; exit 1
          fi
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  proto:
    name: proto is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install protoc-gen-go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Regenerate and diff
        run: |
          protoc --go_out=. --go_opt=module=openindex \
                 --go-grpc_out=. --go-grpc_opt=module=openindex \
                 proto/openindex.proto
          # The generated header stamps the protoc build version, which differs
          # between the local toolchain and the CI runner. Ignore that one
          # comment line so the check is about the schema, not the toolchain.
          strip() { sed -E '/^\/\/.*protoc[[:space:]]+v[0-9]/d' "$1"; }
          fail=0
          for f in proto/*.pb.go; do
            if ! diff -u <(git show "HEAD:$f" | sed -E '/^\/\/.*protoc[[:space:]]+v[0-9]/d') \
                         <(strip "$f"); then
              echo "::error::$f is out of date; run 'make proto'"
              fail=1
            fi
          done
          exit $fail
